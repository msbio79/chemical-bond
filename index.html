<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분자 결합 시뮬레이션</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>분자 결합 시뮬레이션</h1>
            <p>좌측 팔레트의 원소를 작업 영역(화면 중앙)으로 직접 드래그하여 원하는 곳에 붙여보세요! 원소들이 가까워지면 자동으로 결합합니다. (결합 해제: 더블 클릭)</p>
        </header>
        
        <main>
            <div class="sidebar">
                <div class="palette-header">
                    <h2>원소 팔레트</h2>
                    <div class="toggle-container">
                        <span>이온 표시</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ion-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
                <div class="palette-info">원소를 작업 공간으로 드래그!</div>
                
                <div class="scale-control">
                    <span>원자 크기</span>
                    <input type="range" id="atom-scale-slider" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                
                <div class="periodic-table">
                    <!-- 주기 1 -->
                    <div class="element-btn" data-type="H" style="grid-area: 1 / 1;"><span>H</span></div>
                    <div class="element-btn" data-type="He" style="grid-area: 1 / 8;"><span>He</span></div>
                    
                    <!-- 주기 2 -->
                    <div class="element-btn" data-type="Li" style="grid-area: 2 / 1;"><span>Li</span></div>
                    <div class="element-btn" data-type="Be" style="grid-area: 2 / 2;"><span>Be</span></div>
                    <div class="element-btn" data-type="B" style="grid-area: 2 / 3;"><span>B</span></div>
                    <div class="element-btn" data-type="C" style="grid-area: 2 / 4;"><span>C</span></div>
                    <div class="element-btn" data-type="N" style="grid-area: 2 / 5;"><span>N</span></div>
                    <div class="element-btn" data-type="O" style="grid-area: 2 / 6;"><span>O</span></div>
                    <div class="element-btn" data-type="F" style="grid-area: 2 / 7;"><span>F</span></div>
                    <div class="element-btn" data-type="Ne" style="grid-area: 2 / 8;"><span>Ne</span></div>

                    <!-- 주기 3 -->
                    <div class="element-btn" data-type="Na" style="grid-area: 3 / 1;"><span>Na</span></div>
                    <div class="element-btn" data-type="Mg" style="grid-area: 3 / 2;"><span>Mg</span></div>
                    <div class="element-btn" data-type="Al" style="grid-area: 3 / 3;"><span>Al</span></div>
                    <div class="element-btn" data-type="Si" style="grid-area: 3 / 4;"><span>Si</span></div>
                    <div class="element-btn" data-type="P" style="grid-area: 3 / 5;"><span>P</span></div>
                    <div class="element-btn" data-type="S" style="grid-area: 3 / 6;"><span>S</span></div>
                    <div class="element-btn" data-type="Cl" style="grid-area: 3 / 7;"><span>Cl</span></div>
                    <div class="element-btn" data-type="Ar" style="grid-area: 3 / 8;"><span>Ar</span></div>

                    <!-- 주기 4 -->
                    <div class="element-btn" data-type="K" style="grid-area: 4 / 1;"><span>K</span></div>
                    <div class="element-btn" data-type="Ca" style="grid-area: 4 / 2;"><span>Ca</span></div>
                </div>

                <div class="element-details" id="element-details">
                    <div class="element-details-placeholder">주기율표의 원소를<br>호버해보세요!</div>
                </div>

                <div class="molecule-list-container">
                    <h3>분자 목록</h3>
                    <ul id="molecule-list">
                        <li class="empty-state">결합된 분자가 없습니다.</li>
                    </ul>
                </div>

                <button id="clear-btn" class="danger-btn">모두 지우기</button>
            </div>
            
            <div class="workspace-container">
                <canvas id="workspace"></canvas>
                <div class="tooltip" id="tooltip"></div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
